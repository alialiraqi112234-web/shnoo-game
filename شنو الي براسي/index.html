<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شنو اللي براسي - التحدي الصوتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* تصميم عصري وزجاجي (Glassmorphism) */
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background: var(--bg-color); color: var(--text-main); 
            margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: background 0.8s ease; 
            background-image: radial-gradient(circle at top right, rgba(56, 189, 248, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent 40%);
        }
        
        /* الثيمات المتغيرة */
        body.theme-animals { background-color: #064e3b; }
        body.theme-food { background-color: #7f1d1d; }
        body.theme-objects { background-color: #1e3a8a; }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        #welcomeScreen { width: 90%; max-width: 500px; text-align: center; }
        #welcomeScreen h1 { color: var(--primary); font-size: 2.8em; margin: 0 0 10px 0; text-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }

        #gameScreen { display: none; width: 100%; max-width: 1200px; padding: 20px; gap: 20px; align-items: flex-start; justify-content: center; }
        @media (max-width: 800px) { #gameScreen { flex-direction: column; } }

        input, select { 
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; 
            border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); 
            color: white; font-size: 1.1em; text-align: center; outline: none; transition: 0.3s; 
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }

        button { 
            width: 100%; padding: 15px; font-weight: bold; font-size: 1.1em; 
            border-radius: 12px; border: none; cursor: pointer; transition: all 0.2s ease; color: white; 
        }
        button:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); filter: brightness(1.1); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { background: #475569 !important; cursor: not-allowed; opacity: 0.7; }
        
        .btn-blue { background: linear-gradient(135deg, #0284c7, #38bdf8); } 
        .btn-green { background: linear-gradient(135deg, #059669, #10b981); } 
        .btn-red { background: linear-gradient(135deg, #dc2626, #ef4444); } 
        .btn-gray { background: #475569; }
        .btn-outline { background: transparent; border: 2px solid var(--danger); color: var(--danger); }
        .btn-outline:hover { background: var(--danger); color: white; }

        #avatarContainer { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 15px; margin-bottom: 20px; max-height: 180px; overflow-y: auto; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        
        .avatar-select { font-size: 1.8em; cursor: pointer; padding: 5px; border-radius: 12px; transition: 0.2s; user-select: none; }
        .avatar-select:hover { transform: scale(1.2); }
        .avatar-select.selected { background: rgba(56, 189, 248, 0.3); border: 2px solid var(--primary); transform: scale(1.1); box-shadow: 0 0 15px rgba(56, 189, 248, 0.5); }

        .chat-box { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid rgba(255,255,255,0.05);}
        .chat-msg { background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 15px 15px 0 15px; display: inline-block; max-width: 90%; align-self: flex-start; backdrop-filter: blur(5px);}
        .chat-msg-system { text-align: center; color: var(--primary); font-size: 0.9em; align-self: center; background: rgba(56,189,248,0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid rgba(56,189,248,0.2);}

        .player-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(0,0,0,0.3); margin-bottom: 8px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; flex-wrap: wrap;}
        
        /* تأثير الكلام المحسن والذكي */
        .speaking .avatar-icon { 
            box-shadow: 0 0 0 3px var(--success); 
            animation: pulseRing 1.5s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }
        @keyframes pulseRing { 
            0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.7); } 
            70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); } 
            100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } 
        }

        .offline-player { opacity: 0.5; filter: grayscale(1); }
        .champion-glow { border: 2px solid #fbbf24 !important; background: rgba(251, 191, 36, 0.1) !important; box-shadow: 0 0 20px rgba(251,191,36,0.2); }
        
        .game-card-area { display: flex; justify-content: space-between; gap: 15px; margin-top: 20px; }
        .player-game-card { background: rgba(0,0,0,0.3); padding: 25px; border-radius: 20px; width: 48%; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); }
        .word-display { color: var(--primary); font-weight: 900; font-size: 2em; margin: 10px 0 0 0; text-shadow: 0 0 15px rgba(56,189,248,0.4); letter-spacing: 1px;}
        
        .reaction-bar { display: flex; gap: 15px; justify-content: center; margin-top: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);}
        .reaction-btn { background: none; border: none; font-size: 2em; cursor: pointer; transition: 0.2s; padding: 0; width: auto; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));}
        .reaction-btn:hover { transform: scale(1.3) translateY(-5px); }
        
        .floating-emoji { position: fixed; bottom: 10%; font-size: 3em; z-index: 999; animation: floatUp 2.5s ease-out forwards; pointer-events: none; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4));}
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(0.5); } 20% { transform: translateY(-10vh) scale(1.2); } 100% { opacity: 0; transform: translateY(-80vh) scale(1); } }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
    </style>
</head>
<body>
    
    <div id="welcomeScreen" class="glass-panel">
        <h1>شنو اللي براسي؟</h1>
        <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 1.1em;">تحدي الذكاء وسرعة البديهة 🧠</p>
        
        <input id="playerName" type="text" placeholder="اكتب اسمك هنا يا بطل..." required autocomplete="off">
        <div id="avatarContainer"></div>

        <p id="statusMessage" style="color: var(--success); display: none; margin-bottom: 15px; font-weight: bold; animation: pulse 1.5s infinite;"></p>

        <div id="defaultState">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button onclick="toggleSection('createSection')" class="btn-blue">➕ إنشاء روم</button>
                <button onclick="toggleSection('joinSection')" class="btn-gray">🔑 دخول بكود</button>
            </div>
            <div id="createSection" style="display: none; animation: fadeIn 0.3s;">
                <input id="maxPointsInput" type="number" value="5" min="1" max="20" placeholder="نقاط الفوز (مثلا 5)">
                <button onclick="startConnection('create')" class="btn-green">🚀 يالله نبلش</button>
            </div>
            <div id="joinSection" style="display: none; animation: fadeIn 0.3s;">
                <input id="manualRoomCode" type="text" placeholder="رقم الروم السري..." autocomplete="off">
                <button onclick="startConnection('join')" class="btn-green">🚀 ادخل للروم</button>
            </div>
        </div>
    </div>

    <div id="gameScreen">
        <div class="glass-panel" style="flex: 1; max-width: 380px;">
            <div class="top-bar">
                <h3 id="roomTitle" style="color:var(--primary); margin: 0;"></h3>
                <button onclick="leaveRoom()" class="btn-outline" style="width: auto; padding: 5px 15px; font-size: 0.9em;">🚪 خروج</button>
            </div>
            
            <button onclick="copyInviteLink()" class="btn-blue" style="margin-bottom: 15px; font-size: 0.95em;">📋 انسخ رابط الروم لأصدقائك</button>
            <div style="text-align: center; margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 12px;">نقاط البطولة: <b id="winPointsDisplay" style="color:var(--success); font-size:1.3em;"></b> 🏆</div>
            
            <div id="playersList" style="margin-bottom: 15px;"></div>
            <button onclick="toggleMyMic()" id="myMicBtn" class="btn-red">🔇 كتم المايك</button>
        </div>

        <div class="glass-panel" style="flex: 2; display: flex; flex-direction: column; gap: 20px;">
            
            <div id="adminControls" style="display:none; background: rgba(56, 189, 248, 0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(56, 189, 248, 0.2);">
                <b style="color:var(--primary); display:block; margin-bottom:10px;">👑 لوحة القيادة:</b>
                <div style="display: flex; gap: 10px;">
                    <select id="categorySelect" style="margin: 0; flex: 1;">
                        <option value="random">🎲 منوعات عشوائية</option>
                        <option value="animals">🦁 حيوانات</option>
                        <option value="objects">🚗 جماد</option>
                        <option value="food">🍎 أكل</option>
                    </select>
                    <button onclick="startGame()" class="btn-blue" style="flex: 1;">▶️ ابدأ الجولة</button>
                </div>
            </div>

            <h3 id="gameStatusText" style="text-align: center; margin: 0; font-size: 1.5em; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">بانتظار الآدمن لبدء التحدي...</h3>
            
            <div id="activeGameArea" class="game-card-area" style="display: none;">
                <div class="player-game-card">
                    <h4 id="player1Name" style="margin: 0; color: var(--text-muted); font-size: 1.2em;"></h4> 
                    <p id="player1Word" class="word-display">؟ ؟ ؟</p>
                </div>
                <div style="align-self:center; font-size:2.5em; font-weight:900; color:var(--danger); text-shadow:0 0 20px rgba(239, 68, 68, 0.6);">VS</div>
                <div class="player-game-card">
                    <h4 id="player2Name" style="margin: 0; color: var(--text-muted); font-size: 1.2em;"></h4> 
                    <p id="player2Word" class="word-display">؟ ؟ ؟</p>
                </div>
            </div>

            <div id="guessArea" style="display: none; display: flex; gap: 10px;">
                <input id="guessInput" type="text" placeholder="شنو الكلمة اللي براسك؟ اكتبها هنا..." style="margin:0; flex: 3;" autocomplete="off">
                <button onclick="submitGuess()" class="btn-green" style="flex: 1; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);">حزر! 🎯</button>
            </div>
            
            <div id="messages" class="chat-box"></div>
            
            <div style="display: flex; gap: 10px;">
                <input id="chatInput" type="text" placeholder="سولف وية ربعك..." style="margin: 0; flex: 4;" autocomplete="off">
                <button onclick="sendMessage()" class="btn-blue" style="flex: 1;">إرسال</button>
            </div>

            <div class="reaction-bar">
                <button class="reaction-btn" onclick="sendReaction('😂')">😂</button>
                <button class="reaction-btn" onclick="sendReaction('💔')">💔</button>
                <button class="reaction-btn" onclick="sendReaction('👏')">👏</button>
                <button class="reaction-btn" onclick="sendReaction('🤯')">🤯</button>
                <button class="reaction-btn" onclick="sendReaction('🔥')">🔥</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script> 
    
    <script>
        const socket = io();
        let myName = "", myAvatar = "🦁", myRoom = "", myPointsLimit = 5, mySessionId = null;
        let peer = null, myLocalStream = null, audioContext = null, micProcessorInterval = null;
        let isMuted = false, iAmSpeaking = false;

        // الأصوات
        const sfx = {
            join: new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'),
            msg: new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3'),
            win: new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3'),
            lose: new Audio('https://assets.mixkit.co/active_storage/sfx/2047/2047-preview.mp3')
        };
        Object.values(sfx).forEach(a => a.volume = 0.4);

        // ترتيب الأفتارات
        const emojis = ['🦁','🐼','🦊','🐮','🐵','👽','🤖','👻','🤡','😎','💩','🔥','🐯','🐱','🐶','🐭','🐹','🐰','🐻','🐨','🐸','🦍','🐔','🐧','🐦','🐺','🐴','🦄','🦋','🐞','🐢','🐍','🦖','🦕'];
        const avatarCont = document.getElementById('avatarContainer');
        emojis.forEach((e, i) => {
            let span = document.createElement('span'); span.className = 'avatar-select' + (i===0?' selected':''); span.innerText = e;
            span.onclick = function() { document.querySelectorAll('.avatar-select').forEach(el=>el.classList.remove('selected')); this.classList.add('selected'); myAvatar = e; };
            avatarCont.appendChild(span);
        });

        // 1. نظام التحقق من الجلسة السابقة (Reconnection)
        window.onload = () => {
            const savedSession = sessionStorage.getItem('gameSession');
            const savedRoom = sessionStorage.getItem('gameRoom');
            if (savedSession && savedRoom) {
                document.getElementById('statusMessage').style.display = 'block';
                document.getElementById('statusMessage').innerText = "🔄 جاي نرجعك للروم...";
                // إعادة تهيئة الصوت والـ Peer
                initAudioAndPeer().then(peerId => {
                    socket.emit('reconnect user', { room: savedRoom, sessionId: savedSession, peerId: peerId });
                }).catch(err => {
                    sessionStorage.clear();
                    document.getElementById('statusMessage').innerText = "❌ فشل استرجاع المايكروفون. سجل دخول من جديد.";
                });
            }
        };

        // نجاح استرجاع الجلسة
        socket.on('reconnect success', (data) => {
            myRoom = sessionStorage.getItem('gameRoom');
            mySessionId = sessionStorage.getItem('gameSession');
            myName = data.me.name;
            showGameScreen();
        });

        // فشل استرجاع الجلسة
        socket.on('reconnect failed', () => { sessionStorage.clear(); document.getElementById('statusMessage').style.display = 'none'; });

        // حفظ الجلسة الجديدة
        socket.on('session saved', (sessionId) => {
            mySessionId = sessionId;
            sessionStorage.setItem('gameSession', sessionId);
            sessionStorage.setItem('gameRoom', myRoom);
        });

        function toggleSection(id) { document.getElementById('createSection').style.display = 'none'; document.getElementById('joinSection').style.display = 'none'; document.getElementById(id).style.display = 'block'; }

        // الدخول الطبيعي للعبة
        async function startConnection(mode) {
            myName = document.getElementById('playerName').value.trim();
            if (!myName) { alert("اكتب اسمك يا بطل!"); return; }
            
            if (mode === 'create') { myRoom = Math.random().toString(36).substring(2, 8); myPointsLimit = document.getElementById('maxPointsInput').value; } 
            else if (mode === 'join') { myRoom = document.getElementById('manualRoomCode').value.trim(); if (!myRoom) return; }

            document.getElementById('statusMessage').style.display = 'block'; 
            document.getElementById('statusMessage').innerText = "⏳ جاري تجهيز المايك يا بطل...";
            document.querySelectorAll('button').forEach(btn => btn.disabled = true);

            try {
                let peerId = await initAudioAndPeer();
                socket.emit('join room', { room: myRoom, name: myName, avatar: myAvatar, maxPoints: myPointsLimit, peerId: peerId });
                showGameScreen();
            } catch (err) { 
                alert("عذراً! لازم تنطي صلاحية للمايكروفون حتى تلعب."); 
                document.getElementById('statusMessage').style.display = 'none'; 
                document.querySelectorAll('button').forEach(btn => btn.disabled = false); 
            }
        }

        function showGameScreen() {
            document.body.style.justifyContent = 'flex-start';
            document.getElementById('welcomeScreen').style.display = 'none'; 
            document.getElementById('gameScreen').style.display = 'flex'; 
            document.getElementById('roomTitle').innerText = "رقم الروم: " + myRoom;
            document.querySelectorAll('button').forEach(btn => btn.disabled = false);
        }

        // 2. تهيئة المايكروفون النظيفة (بدون تعليق الآيفون)
        async function initAudioAndPeer() {
            return new Promise(async (resolve, reject) => {
                try {
                    myLocalStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
                    detectMySpeechLightweight(myLocalStream); // تشغيل المحلل الخفيف
                    
                    peer = new Peer();
                    peer.on('open', (id) => resolve(id));
                    peer.on('call', (call) => { call.answer(myLocalStream); call.on('stream', playAudio); });
                    peer.on('disconnected', () => { if(peer && !peer.destroyed) peer.reconnect(); });
                } catch(e) { reject(e); }
            });
        }

        function playAudio(stream) { let audio = new Audio(); audio.srcObject = stream; audio.autoplay = true; document.body.appendChild(audio); }

        // 🌟 الحل الجذري لمشكلة تجميد الآيفون 🌟
        function detectMySpeechLightweight(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const mic = audioContext.createMediaStreamSource(stream);
            
            analyser.smoothingTimeConstant = 0.5; // قراءة سريعة وخفيفة
            analyser.fftSize = 256; // حجم صغير جداً حتى ما يستهلك رام
            mic.connect(analyser);
            
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            // نستخدم setInterval بدل requestAnimationFrame حتى نتحكم بالسرعة (مثلاً كل 150 ملي ثانية فقط)
            micProcessorInterval = setInterval(() => {
                if(!myLocalStream || !myLocalStream.getAudioTracks()[0].enabled) return; // إذا المايك مسدود لا تحلل
                
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                let average = sum / dataArray.length;
                
                let isSpeakingNow = average > 15; // حساسية الصوت
                if (isSpeakingNow !== iAmSpeaking) { 
                    iAmSpeaking = isSpeakingNow; 
                    socket.emit('speaking status', { room: myRoom, isSpeaking: iAmSpeaking }); 
                }
            }, 150); // فحص خفيف كل 150 ملي ثانية ما يعلق أي جهاز
        }

        // 3. الخروج من الروم (زر الرجوع للرئيسية) وتنظيف الذاكرة
        function leaveRoom() {
            if(confirm("متأكد تريد تطلع من الروم للرئيسية؟")) {
                // إبلاغ السيرفر
                socket.emit('leave room', { room: myRoom, sessionId: mySessionId });
                
                // تنظيف الـ Session
                sessionStorage.clear();
                
                // إيقاف المايكروفون والاتصالات لتفريغ الرام
                if(myLocalStream) myLocalStream.getTracks().forEach(track => track.stop());
                if(micProcessorInterval) clearInterval(micProcessorInterval);
                if(audioContext && audioContext.state !== 'closed') audioContext.close();
                if(peer) peer.destroy();

                // تحديث الصفحة لضمان بيئة نظيفة 100%
                window.location.reload();
            }
        }

        // مستمعات السوكت
        socket.on('update speaking status', (data) => {
            let avatarSpan = document.getElementById(`avatar-${data.userId}`);
            if(avatarSpan) { data.isSpeaking ? avatarSpan.parentElement.classList.add('speaking') : avatarSpan.parentElement.classList.remove('speaking'); }
        });

        socket.on('user-connected', (data) => { if (data.peerId && peer) { let call = peer.call(data.peerId, myLocalStream); call.on('stream', playAudio); } });
        socket.on('play sound', (type) => { if(sfx[type]) { sfx[type].currentTime=0; sfx[type].play().catch(e=>{}); } });

        socket.on('update players list', (data) => {
            document.getElementById('winPointsDisplay').innerText = data.maxPoints;
            const list = document.getElementById('playersList'); list.innerHTML = ''; 
            document.getElementById('adminControls').style.display = (socket.id === data.adminId) ? 'block' : 'none';
            
            data.players.forEach(player => {
                let isChampion = data.overallWinner === player.id;
                let isOffline = !player.connected;
                
                let div = document.createElement('div'); 
                div.className = "player-item" + (isChampion ? " champion-glow" : "") + (isOffline ? " offline-player" : "");
                
                let statusText = isOffline ? ' <span style="color:var(--danger);font-size:0.8em;">(فاصل 🔴)</span>' : '';
                let text = `<b>${player.name}</b> <span style="color:var(--primary);">[⭐ ${player.score}]</span>${statusText}`;
                if (player.id === data.adminId) text += ' 👑';
                
                div.innerHTML = `<div style="display:flex; align-items:center; width:100%;">
                    <span id="avatar-${player.id}" class="avatar-icon" style="font-size:1.5em; margin-left:10px; padding:5px; border-radius:50%; background:rgba(255,255,255,0.1); display:inline-block; transition:0.2s;">${player.avatar}</span> 
                    <span style="flex-grow:1; text-align:right;">${text}</span>
                </div>`;
                list.appendChild(div);
            });
        });

        socket.on('kicked', () => { alert("انطردت من الروم!"); sessionStorage.clear(); window.location.reload(); });
        
        function toggleMyMic() { 
            let t = myLocalStream.getAudioTracks()[0]; 
            t.enabled = !t.enabled; 
            document.getElementById('myMicBtn').innerText = t.enabled ? "🔇 كتم المايك" : "🎙️ فتح المايك"; 
            document.getElementById('myMicBtn').className = t.enabled ? "btn-red" : "btn-green"; 
        }

        function startGame() { let cat = document.getElementById('categorySelect').value; socket.emit('start game', {room: myRoom, category: cat}); }
        function submitGuess() { let guess = document.getElementById('guessInput').value.trim(); if(guess) { socket.emit('submit guess', { room: myRoom, name: myName, guess: guess }); document.getElementById('guessInput').value = ''; } }
        
        document.getElementById("guessInput").addEventListener("keypress", (e) => { if (e.key === "Enter") submitGuess(); });
        document.getElementById("chatInput").addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

        socket.on('game started', (data) => {
            document.body.className = data.categoryName !== 'random' ? 'theme-' + data.categoryName : '';
            document.getElementById('gameStatusText').innerHTML = `🔥 الجولة بدأت!`; 
            document.getElementById('activeGameArea').style.display = 'flex';
            
            let p1 = data.playerA, p2 = data.playerB;
            document.getElementById('player1Name').innerText = p1.avatar + " " + p1.name; document.getElementById('player2Name').innerText = p2.avatar + " " + p2.name;
            
            let setW = (id, txt, col) => { let el = document.getElementById(id); el.innerText = txt; el.style.color = col; };
            if (socket.id === p1.id) { setW('player1Word', "؟ ؟ ؟ (أنت)", "var(--text-muted)"); setW('player2Word', p2.word, "var(--primary)"); document.getElementById('guessArea').style.display = 'flex'; } 
            else if (socket.id === p2.id) { setW('player1Word', p1.word, "var(--primary)"); setW('player2Word', "؟ ؟ ؟ (أنت)", "var(--text-muted)"); document.getElementById('guessArea').style.display = 'flex'; } 
            else { setW('player1Word', p1.word, "var(--primary)"); setW('player2Word', p2.word, "var(--primary)"); document.getElementById('guessArea').style.display = 'none'; }
        });

        socket.on('wrong guess', (data) => addSystemMessage(`❌ ${data.name} حاول يجاوب "${data.guess}" وطلع خطأ!`));
        
        socket.on('round over', (data) => { 
            document.getElementById('activeGameArea').style.display = 'none'; document.getElementById('guessArea').style.display = 'none'; 
            document.body.className = ''; 
            if(data.isFinalWin) { 
                document.getElementById('gameStatusText').innerHTML = `انفجار الألوان! 🏆 <b style="color:#fbbf24">${data.winnerName}</b> هو البطل!`; 
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            } else { 
                document.getElementById('gameStatusText').innerHTML = `🎉 الجولة انتهت! ${data.winnerName} عرف الكلمة "${data.word}"!`; 
            } 
        });

        function sendMessage() { let input = document.getElementById('chatInput'); if (input.value) { socket.emit('chat message', { room: myRoom, name: myName, avatar: myAvatar, msg: input.value }); input.value = ''; } }
        socket.on('chat message', (data) => { 
            let div = document.createElement('div'); 
            if(data.msg.includes('يغشش')) { div.className = "chat-msg-system"; div.style.color = "var(--danger)"; div.style.borderColor = "var(--danger)"; div.innerHTML = `🚨 ${data.name} ${data.msg}`; } 
            else { div.className = "chat-msg"; div.innerHTML = `<b>${data.avatar} ${data.name}:</b> ${data.msg}`; } 
            document.getElementById('messages').appendChild(div); document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight; 
        });
        
        function addSystemMessage(msg) { let div = document.createElement('div'); div.className = "chat-msg-system"; div.innerHTML = msg; document.getElementById('messages').appendChild(div); document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight; }
        socket.on('system message', addSystemMessage); 

        function sendReaction(emoji) { socket.emit('send reaction', { room: myRoom, emoji: emoji }); }
        socket.on('show reaction', (data) => {
            let el = document.createElement('div'); el.className = 'floating-emoji'; el.innerText = data.emoji;
            el.style.left = data.x + '%'; document.body.appendChild(el);
            setTimeout(() => el.remove(), 2500);
        });
        
        function copyInviteLink() { navigator.clipboard.writeText(window.location.origin + "?room=" + myRoom); alert("✅ تم نسخ رابط الروم!"); }
    </script>
</body>
</html>
